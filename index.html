<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活管理アプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-pink: #fff0f3;
            --main-pink: #ff85a2;
            --main-pink-hover: #f06587;
            --sub-pink: #fbc4ab;
            --text-dark: #4a4a4a;
            --text-muted: #858585;
            --white: #ffffff;
            --card-shadow: 0 8px 20px rgba(255, 133, 162, 0.12);
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        body {
            background-color: var(--bg-pink);
            color: var(--text-dark);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: var(--main-pink);
            font-size: 2rem;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 1px 1px 0px var(--white), 2px 2px 0px rgba(255,133,162,0.2);
        }

        /* ログインエリアのスタイル */
        .auth-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            background: white;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }

        .btn-auth {
            background-color: white;
            color: var(--text-dark);
            border: 2px solid var(--main-pink);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-auth:hover {
            background-color: var(--main-pink);
            color: white;
        }

        /* メインコンテンツ（ログイン前は隠す） */
        #mainContent {
            display: none;
        }

        /* ログインを促すプレースホルダー */
        #loginPlaceholder {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            max-width: 500px;
            margin: 40px auto;
        }

        #loginPlaceholder h2 {
            color: var(--main-pink);
            margin-bottom: 12px;
        }

        #loginPlaceholder p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .top-row {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 2px solid rgba(255, 133, 162, 0.15);
        }

        .card h2 {
            font-size: 1.25rem;
            color: var(--main-pink);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px dashed #ffe3e8;
            padding-bottom: 8px;
        }

        /* フォームのスタイル */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        @media (max-width: 600px) {
            .form-group.full-width {
                grid-column: span 1;
            }
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        input[type="text"], input[type="url"], input[type="date"], select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ffe3e8;
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-dark);
            background-color: #fffafb;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--main-pink);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.1);
        }

        .datetime-container {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .time-pickers {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .time-pickers select {
            padding: 6px;
            width: 60px;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            accent-color: var(--main-pink);
            width: 15px;
            height: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .btn {
            background-color: var(--main-pink);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 133, 162, 0.2);
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--main-pink-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 133, 162, 0.3);
        }

        /* ToDoリストのスタイル */
        .todo-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px dashed #ffe3e8;
            padding-bottom: 8px;
            position: relative;
        }

        .todo-header-container h2 {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .btn-history-toggle {
            background: #fff0f3;
            border: 1px solid var(--main-pink);
            color: var(--main-pink);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-history-toggle:hover {
            background: var(--main-pink);
            color: white;
        }

        /* 履歴ポップアップ */
        .history-popup {
            display: none;
            position: absolute;
            top: 40px;
            right: 0;
            width: 300px;
            max-height: 350px;
            background: white;
            border: 2px solid var(--main-pink);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 100;
            overflow: hidden;
        }

        .history-tabs {
            display: flex;
            background: #fff0f3;
            border-bottom: 1px solid #ffe3e8;
        }

        .history-tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            font-size: 0.8rem;
            font-weight:700;
            cursor:pointer;
            color: var(--text-muted);
        }

        .history-tab-btn.active {
            background: white;
            color: var(--main-pink);
            border-bottom: 2px solid var(--main-pink);
        }

        .history-items-container {
            max-height: 300px;
            overflow-y: auto;
            padding: 5px 0;
        }

        .history-item-row {
            padding: 8px 12px;
            font-size: 0.8rem;
            border-bottom: 1px solid #fff5f6;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item-row:hover {
            background: #fffdfd;
        }

        .history-item-row > span {
            word-break: break-all;
        }

        .history-edit-box {
            margin-top: 4px;
            background: #fff5f6;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px dashed var(--main-pink);
        }

        .history-edit-select {
            padding: 2px 4px;
            font-size: 0.75rem;
            width: auto;
            border: 1px solid var(--main-pink);
            background: white;
            border-radius: 4px;
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            padding: 12px;
            border-left: 5px solid var(--main-pink);
            background-color: #fff5f6;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.5;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            user-select: none;
        }

        .todo-item strong {
            color: var(--text-dark);
        }

        .todo-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 0.85rem;
        }

        /* 完了/まだオーバレイ */
        .task-action-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 5;
        }

        .btn-task-action {
            border: none; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; cursor: pointer;
        }

        .btn-task-done { background: #2b8a3e; color: white; }
        .btn-task-yet { background: #868e96; color: white; }

        /* タスク用ページネーション */
        .task-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .btn-task-page {
            background: white;
            border: 1px solid #ffe3e8;
            color: var(--main-pink);
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }

        .btn-task-page:hover { background: var(--main-pink); color: white; }

        /* カレンダーのスタイル */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .calendar-nav h3 {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        .calendar-nav-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-cal-nav {
            background: var(--white);
            border: 2px solid #ffe3e8;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-dark);
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-cal-nav:hover {
            border-color: var(--main-pink);
            color: var(--main-pink);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background-color: #ffe3e8;
            padding: 4px;
            border-radius: 12px;
        }

        .calendar-header-cell {
            background-color: #fff5f6;
            text-align: center;
            padding: 6px 0;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dark);
            border-radius: 6px;
        }

        .calendar-header-cell:nth-child(7) { color: #228be6; }
        .calendar-header-cell:nth-child(1) { color: #fa5252; }

        .calendar-cell {
            background-color: var(--white);
            min-height: 55px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 6px;
            position: relative;
        }

        .calendar-day-num {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .calendar-cell.other-month .calendar-day-num {
            color: #dee2e6;
        }

        .calendar-cell.today {
            background-color: #fff0f3;
            border: 2px solid var(--main-pink);
        }

        .calendar-dots {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            min-height: 12px;
        }

        .cal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }

        /* セル内ポップアップ */
        .calendar-popup {
            display: none;
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            width: 150px;
            z-index: 50;
            word-break: break-all;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .calendar-popup::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%; transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.85);
        }

        /* 企業一覧テーブルのスタイル */
        .main-card {
            margin-top: 20px;
        }

        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-container {
            position: relative;
            max-width: 300px;
            width: 100%;
        }

        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .search-container input {
            padding-left: 34px;
        }

        .filter-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 2px solid #ffe3e8;
        }

        /* デスクトップ表示用テーブル */
        .company-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--white);
            text-align: left;
            font-size: 0.85rem;
        }

        .company-table th, .company-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #ffe3e8;
            white-space: nowrap;
        }

        .company-table th {
            background-color: #fff5f6;
            color: var(--main-pink);
            font-weight: 700;
        }

        .company-table tr:last-child td {
            border-bottom: none;
        }

        /* モバイル表示用カードビュー */
        .mobile-cards-view {
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        .mobile-comp-card {
            background: white;
            border: 2px solid #ffe3e8;
            border-radius: 12px;
            padding: 14px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mobile-comp-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px dashed #ffe3e8;
            padding-bottom: 6px;
        }

        .mobile-comp-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .mobile-comp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-comp-label {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .mobile-comp-value {
            color: var(--text-dark);
        }

        .mobile-comp-memo {
            background: #fffafb;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid #fff0f2;
        }

        .mobile-comp-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 4px;
            border-top: 1px dashed #ffe3e8;
            padding-top: 8px;
        }

        /* レスポンシブ切り替え */
        @media (max-width: 1024px) {
            .table-responsive { display: none; }
            .mobile-cards-view { display: flex; }
        }

        /* 編集フォーム（インライン用共通スタイル） */
        .inline-edit-grid, .mobile-edit-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fffafb;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed var(--main-pink);
            white-space: normal !important;
        }

        .inline-edit-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .inline-edit-row label {
            min-width: 70px;
            font-size: 0.75rem;
        }

        .inline-edit-row input, .inline-edit-row select, .inline-edit-row textarea {
            flex: 1;
            padding: 6px;
            font-size: 0.8rem;
        }

        /* 汎用ステータスバッジ */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
        }

        .badge-none { background-color: #e2e8f0; color: #4a5568; }
        .badge-es-making { background-color: #ffccd5; color: #ff4d6d; }
        .badge-es-done { background-color: #ffb3c1; color: #c9184a; }
        .badge-interview { background-color: #fff3bf; color: #e67e22; }
        .badge-waiting { background-color: #c3fae8; color: #0ca678; }
        .badge-naitei { background-color: #eebefa; color: #ae3ec9; }
        .badge-failed { background-color: #f1f3f5; color: #868e96; }

        /* 操作ボタン */
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 4px;
            transition: transform 0.2s;
        }

        .btn-icon:hover { transform: scale(1.1); }
        .btn-edit { color: #4dadf7; }
        .btn-delete { color: #ff6b6b; }
        .btn-save { color: #2b8a3e; font-size:0.8rem; padding: 4px 8px; border: 1px solid #2b8a3e; border-radius: 4px; background: white; font-weight:700;}
        .btn-cancel { color: #868e96; font-size:0.8rem; padding: 4px 8px; border: 1px solid #868e96; border-radius: 4px; background: white; font-weight:700;}

        /* テーブル内チェックボックス */
        .table-checkbox {
            accent-color: var(--main-pink);
            width: 16px; height: 16px; cursor: pointer;
        }

        /* リンク用 */
        .table-link {
            color: var(--main-pink); text-decoration: none; font-weight: 700; display: inline-flex; align-items: center; gap: 4px;
        }
        .table-link:hover { text-decoration: underline; }

        /* ページネーション（メインテーブル） */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
        }

        .page-link {
            padding: 6px 12px;
            border: 2px solid #ffe3e8;
            background-color: var(--white);
            color: var(--text-dark);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .page-link.active {
            background-color: var(--main-pink);
            border-color: var(--main-pink);
            color: var(--white);
        }

        .page-link:hover:not(.active) {
            border-color: var(--main-pink);
            color: var(--main-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="auth-container">
            <div id="userInfoArea" class="user-info" style="display: none;">
                <img id="userAvatar" class="user-avatar" src="" alt="">
                <span id="userName">ユーザー名</span>
            </div>
            <button id="authBtn" class="btn-auth"><i class="fa-solid fa-right-to-bracket"></i> Googleログイン</button>
        </div>

        <h1>🐾 就活おたすけBOX 🎀</h1>

        <div id="loginPlaceholder">
            <h2>こんにちは！👋</h2>
            <p>このアプリはGoogleアカウントでログインすると、PCやスマホの間でデータをリアルタイムに自動同期・保存できるようになります。右上のボタンからログインしてね！</p>
        </div>

        <div id="mainContent">
            <div class="top-row">
                <div class="card">
                    <h2><i class="fa-solid fa-square-plus"></i> 新しく企業を登録する</h2>
                    <form id="companyForm">
                        <div class="form-grid">
                            <div class="form-group full-width">
                                <label for="compName">企業名 <span style="color:var(--main-pink);">*</span></label>
                                <input type="text" id="compName" placeholder="〇〇株式会社" required>
                            </div>
                            <div class="form-group">
                                <label for="compHp">企業HP</label>
                                <input type="url" id="compHp" placeholder="https://...">
                            </div>
                            <div class="form-group">
                                <label for="mypageUrl">マイページURL</label>
                                <input type="url" id="mypageUrl" placeholder="https://...">
                            </div>

    <script>
        // 1. 送っていただいたFirebaseの設定情報をここに直接組み込みました！
        const firebaseConfig = {
            apiKey: "AIzaSyBmjTAyOgcIjUoIn27RjYNP3DARNQGDeno",
            authDomain: "job-hunting-f574e.firebaseapp.com",
            projectId: "job-hunting-f574e",
            storageBucket: "job-hunting-f574e.firebasestorage.app",
            messagingSenderId: "1073449569861",
            appId: "1:1073449569861:web:0b541c50a3abc3b7695d2c"
        };

        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        // アプリ内の状態管理変数
        let currentUid = null;
        let unsubscribeCompanies = null; // リアルタイム同期解除用
        let companies = [];
        let editingIndex = null;
        let currentCalendarDate = new Date();

        // ページネーション設定
        let currentPage = 1;
        const rowsPerPage = 5;
        let currentTaskPage = 1;
        const tasksPerPage = 3;

        // 履歴ポップアップ用設定
        let currentHistoryTab = 'done';
        let historyEditingKey = null;

        // 初期セットアップ
        document.addEventListener('DOMContentLoaded', () => {
            setupTimeSelectOptions('esHour', 'esMin');
            setupTimeSelectOptions('interviewHour', 'interviewMin');

            // 認証状態の監視（ログインしているか、していないかを自動判別）
            auth.onAuthStateChanged(user => {
                if (user) {
                    // ログイン成功時
                    currentUid = user.uid;
                    showLoggedInUI(user);
                    startRealTimeSync(user.uid);
                } else {
                    // 未ログイン、またはログアウト時
                    currentUid = null;
                    showLoggedOutUI();
                    if(unsubscribeCompanies) unsubscribeCompanies();
                    companies = [];
                }
            });

            // ログインボタンのクリックイベント
            document.getElementById('authBtn').addEventListener('click', () => {
                if (auth.currentUser) {
                    auth.signOut();
                } else {
                    auth.signInWithPopup(provider).catch(error => {
                        console.error("ログインエラー:", error);
                        alert("ログインに失敗しました。もう一度試してみてね！");
                    });
                }
            });
        });

        // ログイン状態に応じた画面レイアウト切り替え
        function showLoggedInUI(user) {
            document.getElementById('userInfoArea').style.display = 'flex';
            document.getElementById('userAvatar').src = user.photoURL || '';
            document.getElementById('userName').textContent = user.displayName || 'ユーザー';
            document.getElementById('authBtn').innerHTML = '<i class="fa-solid fa-right-from-bracket"></i> ログアウト';
            document.getElementById('loginPlaceholder').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }

        function showLoggedOutUI() {
            document.getElementById('userInfoArea').style.display = 'none';
            document.getElementById('authBtn').innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Googleログイン';
            document.getElementById('loginPlaceholder').style.display = 'block';
            document.getElementById('mainContent').style.display = 'none';
        }

        // Firebase(Firestore)からデータを「リアルタイム」に受信する処理
        function startRealTimeSync(uid) {
            if(unsubscribeCompanies) unsubscribeCompanies();

            // ログインユーザー専用のフォルダ（ドキュメント）を監視
            unsubscribeCompanies = db.collection('users').doc(uid).onSnapshot(doc => {
                if (doc.exists && doc.data().companies) {
                    companies = doc.data().companies;
                } else {
                    companies = [];
                }
                // データがクラウド側で変更されたら自動で画面を再描画！
                renderAll();
            }, error => {
                console.error("データ同期エラー:", error);
            });
        }

        // クラウド（Firestore）にデータを保存する処理
        function saveToFirebase() {
            if (!currentUid) return;
            db.collection('users').doc(currentUid).set({
                companies: companies
            }).catch(error => {
                console.error("保存失敗:", error);
                alert("クラウドへの保存に失敗しちゃいました。通信環境を確認してみてね！");
            });
        }

        function renderAll() {
            renderTable();
            renderTodoList();
            renderCalendar();
            if (document.getElementById('historyListPopup').style.display === 'block') {
                renderHistoryPopupContents();
            }
        }

        function setupTimeSelectOptions(hourId, minId) {
            const hSelect = document.getElementById(hourId);
            const mSelect = document.getElementById(minId);
            if(!hSelect || !mSelect) return;
            for(let i=0; i<24; i++) { const opt = document.createElement('option'); opt.value = String(i).padStart(2,'0'); opt.textContent = String(i).padStart(2,'0'); hSelect.appendChild(opt); }
            for(let i=0; i<60; i+=5) { const opt = document.createElement('option'); opt.value = String(i).padStart(2,'0'); opt.textContent = String(i).padStart(2,'0'); mSelect.appendChild(opt); }
        }

        function toggleTimeSetup(dateId, containerId) {
            const dateVal = document.getElementById(dateId).value;
            document.getElementById(containerId).style.display = dateVal ? "inline-flex" : "none";
        }

        function toggleTimeFields(checkId, hourId, minId) {
            const isChecked = document.getElementById(checkId).checked;
            document.getElementById(hourId).disabled = !isChecked;
            document.getElementById(minId).disabled = !isChecked;
        }

        function getStatusBadgeClass(status) {
            switch(status) {
                case '未エントリー': return 'badge-none';
                case 'ES作成中': return 'badge-es-making';
                case 'ES提出済み': return 'badge-es-done';
                case 'テスト': case 'GD': case '一次面接': case '二次面接': case '最終面接': return 'badge-interview';
                case 'インターン': case '結果待ち': return 'badge-waiting';
                case '内定': return 'badge-naitei';
                case '不合格': return 'badge-failed';
                default: return 'badge-none';
            }
        }

        function handleSearchFilter() {
            currentPage = 1;
            renderTable();
        }

        function getFilteredCompanies() {
            const searchTxt = document.getElementById('searchBar').value.toLowerCase().trim();
            const filterVal = document.getElementById('statusFilter').value;

            return companies.map((c, index) => ({ ...c, originalIndex: index })).filter(comp => {
                const matchSearch = comp.name.toLowerCase().includes(searchTxt) || comp.memo.toLowerCase().includes(searchTxt);
                if (!matchSearch) return false;

                if (filterVal === 'ALL') return true;
                if (filterVal === '選考中') return comp.status !== '不合格';
                if (filterVal === '選考中・面接等') {
                    return ['テスト','GD','一次面接','二次面接','最終面接','インターン','結果待ち','その他'].includes(comp.status);
                }
                return comp.status === filterVal;
            });
        }

            const totalPages = Math.ceil(totalItems / rowsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * rowsPerPage;
            const pageItems = filtered.slice(startIndex, startIndex + rowsPerPage);

            pageItems.forEach(comp => {

                // --- PC用行の生成 ---

                                </div>
                                <div class="inline-edit-row">

        function renderTodoList() {
            const todoList = document.getElementById('todoList');
            if (!todoList) return;
            todoList.innerHTML = '';
            
            const now = new Date();
            const sevenDaysLater = new Date();
            sevenDaysLater.setDate(now.getDate() + 7);
            sevenDaysLater.setHours(23, 59, 59, 999);

            let allTasks = [];
            companies.forEach((comp, originalIdx) => {
                if (comp.status === '不合格') return;
                if (comp.esDeadline && !comp.esDone && !comp.esTaskCompleted) {
                    const cleanStr = comp.esDeadline.includes(" ") ? comp.esDeadline.replace(/-/g, "/") : comp.esDeadline.replace(/-/g, "/") + " 00:00";
                    const esDate = new Date(cleanStr);
                    if (esDate >= now && esDate <= sevenDaysLater) {
                        allTasks.push({
                            type: 'ES', companyIndex: originalIdx, date: esDate,
                            html: `🎀 <strong>【ES】</strong>${escapeHtml(comp.name)}<br>⏰ 締切: ${comp.esDeadline}`,
                            color: '#ff85a2', bg: '#fff0f3'
                        });
                    }
                }
                if (comp.interviewDate && !comp.interviewTaskCompleted) {
                    const cleanStr = comp.interviewDate.includes(" ") ? comp.interviewDate.replace(/-/g, "/") : comp.interviewDate.replace(/-/g, "/") + " 00:00";
                    const intDate = new Date(cleanStr);
                    if (intDate >= now && intDate <= sevenDaysLater) {
                        const typeStr = comp.nextDateType ? comp.nextDateType : '予定';
                        allTasks.push({
                            type: 'INTERVIEW', companyIndex: originalIdx, date: intDate,
                            html: `🐾 <strong>【${escapeHtml(typeStr)}】</strong>${escapeHtml(comp.name)}<br>⏰ 日時: ${comp.interviewDate}`,
                            color: '#ffd43b', bg: '#fffdf0'
                        });
                    }
                }
            });

            allTasks.sort((a, b) => a.date - b.date);
            const totalTasks = allTasks.length;
            const totalPages = Math.ceil(totalTasks / tasksPerPage) || 1;
            if (currentTaskPage > totalPages) currentTaskPage = totalPages;

            const pagContainer = document.getElementById('taskPagination');
            const pageNumSpan = document.getElementById('taskPageNum');
            
            if (totalTasks > tasksPerPage) {
                pagContainer.style.display = 'flex';
                pageNumSpan.textContent = `${currentTaskPage} / ${totalPages}`;
            } else {
                pagContainer.style.display = 'none';
            }

            const startIndex = (currentTaskPage - 1) * tasksPerPage;
            const pageTasks = allTasks.slice(startIndex, startIndex + tasksPerPage);

            pageTasks.forEach((task, pageIdx) => {
                const li = document.createElement('li');
                li.className = 'todo-item'; li.style.borderColor = task.color; li.style.backgroundColor = task.bg;
                
                const infoDiv = document.createElement('div');
                infoDiv.innerHTML = task.html;
                li.appendChild(infoDiv);

                const actionId = `task-action-${startIndex + pageIdx}`;
                const actionDiv = document.createElement('div');
                actionDiv.id = actionId; actionDiv.className = 'task-action-overlay';
                actionDiv.innerHTML = `
                    <button class="btn-task-action btn-task-done" onclick="completeTask(event, ${task.companyIndex}, '${task.type}')">完了</button>
                    <button class="btn-task-action btn-task-yet" onclick="closeTaskAction(event, '${actionId}')">まだ</button>
                `;
                li.appendChild(actionDiv);
                li.setAttribute('onclick', `toggleTaskAction('${actionId}')`);
                todoList.appendChild(li);
            });

            if (totalTasks === 0) {
                todoList.innerHTML = '<li class="todo-empty">直近7日以内の予定はないよ。のんびりいこう〜☕️</li>';
                pagContainer.style.display = 'none';
            }
        }

        window.changeHistoryStatusInline = function(e, compIdx, taskType) {
            const newStatus = e.target.value;
            if (taskType === 'ES') {
                if (newStatus === '済') {
                    companies[compIdx].esDone = true;
                    companies[compIdx].esTaskCompleted = true;
                    if (companies[compIdx].status === 'ES作成中') companies[compIdx].status = 'ES提出済み';
                } else {
                    companies[compIdx].esDone = false;
                    companies[compIdx].esTaskCompleted = false;
                    if (companies[compIdx].status === 'ES提出済み') companies[compIdx].status = 'ES作成中';
                }
            } else if (taskType === 'INTERVIEW') {
                companies[compIdx].interviewTaskCompleted = (newStatus === '済');
            }
            historyEditingKey = null;
            saveToFirebase();
        };

        function renderHistoryPopupContents() {
            const container = document.getElementById('historyItemsContainer');
            if (!container) return;
            container.innerHTML = '';

            const now = new Date();

            if (currentHistoryTab === 'done') {
                companies.forEach((comp, compIdx) => {
                    if (comp.esDone || comp.esTaskCompleted) {
                        const uniqueKey = `done-es-${compIdx}`;
                        const displayStr = `${escapeHtml(comp.name)} ES ${comp.esDeadline ? comp.esDeadline : ''}`;
                        createHistoryRowElement(container, displayStr, uniqueKey, compIdx, 'ES', '済');
                    }
                    if (comp.interviewTaskCompleted) {
                        const label = comp.nextDateType ? comp.nextDateType : '予定';
                        const uniqueKey = `done-int-${compIdx}`;
                        const displayStr = `${escapeHtml(comp.name)} ${escapeHtml(label)} ${comp.interviewDate ? comp.interviewDate : ''}`;
                        createHistoryRowElement(container, displayStr, uniqueKey, compIdx, 'INTERVIEW', '済');
                    }
                });
            } else {
                companies.forEach((comp, compIdx) => {
                    if (comp.status === '不合格') return;

                    if (comp.esDeadline && !comp.esDone && !comp.esTaskCompleted) {
                        const cleanStr = comp.esDeadline.includes(" ") ? comp.esDeadline.replace(/-/g, "/") : comp.esDeadline.replace(/-/g, "/") + " 23:59";
                        if (new Date(cleanStr) < now) {
                            const uniqueKey = `yet-es-${compIdx}`;
                            const displayStr = `${escapeHtml(comp.name)} ES ${comp.esDeadline}`;
                            createHistoryRowElement(container, displayStr, uniqueKey, compIdx, 'ES', '未');
                        }
                    }
                    if (comp.interviewDate && !comp.interviewTaskCompleted) {
                        const cleanStr = comp.interviewDate.includes(" ") ? comp.interviewDate.replace(/-/g, "/") : comp.interviewDate.replace(/-/g, "/") + " 23:59";
                        if (new Date(cleanStr) < now) {
                            const label = comp.nextDateType ? comp.nextDateType : '予定';
                            const uniqueKey = `yet-int-${compIdx}`;
                            const displayStr = `${escapeHtml(comp.name)} ${escapeHtml(label)} ${comp.interviewDate}`;
                            createHistoryRowElement(container, displayStr, uniqueKey, compIdx, 'INTERVIEW', '未');
                        }
                    }
                });
            }

            if (container.children.length === 0) {
                container.innerHTML = '<div style="font-size:0.75rem; color:#868e96; text-align:center; padding:10px;">表示するデータがありません</div>';
            }
        }

        function createHistoryRowElement(container, text, key, compIdx, taskType, currentVal) {
            const wrapper = document.createElement('div');

                        <option value="未" ${currentVal === '未' ? 'selected' : ''}>未</option>
                    </select>
                `;
                wrapper.appendChild(editDiv);
            }

            container.appendChild(wrapper);
        }

        function getDotColor(status) {
            switch(status) {
                case '未エントリー': case '説明会': case 'その他': return '#e2e8f0'; 
                case 'ES作成中': case 'ES提出済み': return '#ffccd5'; 
                case 'テスト': case 'GD': case '一次面接': case '二次面接': case '最終面接': return '#fff3bf'; 
                case 'インターン': case '結果待ち': return '#c3fae8'; 
                case '内定': return '#eebefa'; 
                default: return '#e2e8f0';
            }
        }

        function renderCalendar() {
            const title = document.getElementById('calendarTitle');
            const grid = document.getElementById('calendarGrid');
            if (!title || !grid) return;
            grid.innerHTML = '';
            
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            title.textContent = `${year}年 ${month + 1}月`;
            
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            weekdays.forEach(w => { const cell = document.createElement('div'); cell.className = 'calendar-header-cell'; cell.textContent = w; grid.appendChild(cell); });
            
            const firstDayOfMonth = new Date(year, month, 1);
            const startOffset = firstDayOfMonth.getDay();
            const calendarStartDate = new Date(firstDayOfMonth);
            calendarStartDate.setDate(firstDayOfMonth.getDate() - startOffset);
            
            const today = new Date();
            for (let i = 0; i < 42; i++) {
                const currentDate = new Date(calendarStartDate);
                currentDate.setDate(calendarStartDate.getDate() + i);
                if (i >= 35 && currentDate.getMonth() !== month && currentDate.getDay() === 0) break;
                
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                if (currentDate.getMonth() !== month) cell.classList.add('other-month');
                if (currentDate.toDateString() === today.toDateString()) cell.classList.add('today');
                
                const dayNum = document.createElement('span');
                dayNum.className = 'calendar-day-num'; dayNum.textContent = currentDate.getDate();
                cell.appendChild(dayNum);
                
                const dotsContainer = document.createElement('div');
                dotsContainer.className = 'calendar-dots';
                
                let dayEvents = [];
                const yyyy = currentDate.getFullYear();
                const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
                const dd = String(currentDate.getDate()).padStart(2, '0');
                const compStr = `${yyyy}-${mm}-${dd}`;
                
                companies.forEach(comp => {
                    if (comp.status === '不合格') return;
                    if (comp.esDeadline && !comp.esDone && comp.esDeadline.startsWith(compStr)) {
                        dayEvents.push({ text: `🎀 ES期限: ${comp.name}`, status: comp.status || '未エントリー' });
                    }
                    if (comp.interviewDate && comp.interviewDate.startsWith(compStr)) {
                        dayEvents.push({ text: `🐾 ${comp.nextDateType || '予定'}: ${comp.name}`, status: comp.status || '未エントリー' });
                    }
                });
                
                if (dayEvents.length > 0) {
                    dayEvents.forEach(ev => {
                        const dot = document.createElement('span');
                        dot.className = `cal-dot`;
                        dot.style.backgroundColor = getDotColor(ev.status);
                        dot.setAttribute('onclick', `togglePopupInCell(event, ${i})`);
                        dotsContainer.appendChild(dot);
                    });
                    
                    const clickInfo = dayEvents.map(e => e.text).join('<br>');
                    const popDiv = document.createElement('div');
                    popDiv.id = `popup-${i}`; popDiv.className = 'calendar-popup'; popDiv.innerHTML = clickInfo;
                    cell.appendChild(popDiv);
                }
                cell.appendChild(dotsContainer);
                grid.appendChild(cell);
            }
        }

        }

        function buildDateTimeString(dateId, checkId, hourId, minId) {
            const dateVal = document.getElementById(dateId).value;
            if (!dateVal) return "";
            return document.getElementById(checkId).checked ? `${dateVal} ${document.getElementById(hourId).value}:${document.getElementById(minId).value}` : dateVal;
        }
        function parseDateTimeString(str) {
            if (!str) return { date: "", hasTime: false, hour: "00", min: "00" };
            const parts = str.split(" ");
            if (parts.length === 2) { const t = parts[1].split(":"); return { date: parts[0], hasTime: true, hour: t[0], min: t[1] }; }
            return { date: str, hasTime: false, hour: "00", min: "00" };
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
    </script>
</body>
</html>
